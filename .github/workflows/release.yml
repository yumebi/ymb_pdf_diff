name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Tesseract-OCR (source for vendoring)
        run: choco install tesseract -y

      - name: Fetch Tesseract vendor files (bundle OCR into the app)
        run: python scripts/fetch_tesseract_vendor.py

      - name: Build executable (PyInstaller)
        run: python scripts/build.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\windows\installer.iss'

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: packaging/windows/YMB_PDF_DIFF_Setup.exe

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/windows/YMB_PDF_DIFF_Setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Build app bundle (PyInstaller)
        run: python scripts/build.py

      - name: Build dmg
        run: bash packaging/macos/build_dmg.sh

      - name: Upload macOS dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/YMB_PDF_DIFF.dmg

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/YMB_PDF_DIFF.dmg

  update-version-json:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update version.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat > version.json <<EOF
          {
            "latest_version": "$VERSION",
            "download_url": "https://github.com/${{ github.repository }}/releases/tag/${GITHUB_REF_NAME}"
          }
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --cached --quiet || git commit -m "Update version.json for ${GITHUB_REF_NAME}"
          git push origin main
