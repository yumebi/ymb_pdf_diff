name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "リリースするバージョン(例: 1.0.0)。空ならpatchを自動インクリメント"
        required: false
        type: string

permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Bump patch version, tag, and update version.json
        id: bump
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -e
          if [ -n "$INPUT_VERSION" ]; then
            NEW_VERSION="$INPUT_VERSION"
          else
            git fetch --tags origin
            LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)
            if [ -z "$LATEST_TAG" ]; then
              LATEST_TAG="v0.0.0"
            fi
            VERSION_NO_V=${LATEST_TAG#v}
            MAJOR=$(echo "$VERSION_NO_V" | cut -d. -f1)
            MINOR=$(echo "$VERSION_NO_V" | cut -d. -f2)
            PATCH=$(echo "$VERSION_NO_V" | cut -d. -f3)
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          NEW_TAG="v$NEW_VERSION"

          sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" ymb_pdf_diff/__init__.py
          sed -i "s/#define AppVersion \".*\"/#define AppVersion \"$NEW_VERSION\"/" packaging/windows/installer.iss
          cat > version.json <<EOF
          {
            "latest_version": "$NEW_VERSION",
            "download_url": "https://github.com/${{ github.repository }}/releases/tag/$NEW_TAG"
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ymb_pdf_diff/__init__.py packaging/windows/installer.iss version.json
          git commit -m "Release $NEW_VERSION [skip ci]"
          git tag "$NEW_TAG"
          git push origin main
          git push origin "$NEW_TAG"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: determine-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Tesseract-OCR (source for vendoring)
        run: choco install tesseract -y

      - name: Fetch Tesseract vendor files (bundle OCR into the app)
        run: python scripts/fetch_tesseract_vendor.py

      - name: Build executable (PyInstaller)
        run: python scripts/build.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\windows\installer.iss'

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: packaging/windows/YMB_PDF_DIFF_Setup.exe

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.determine-version.outputs.tag }}
          files: packaging/windows/YMB_PDF_DIFF_Setup.exe

  build-macos:
    needs: determine-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Build app bundle (PyInstaller)
        run: python scripts/build.py

      - name: Build dmg
        run: bash packaging/macos/build_dmg.sh

      - name: Upload macOS dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/YMB_PDF_DIFF.dmg

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.determine-version.outputs.tag }}
          files: dist/YMB_PDF_DIFF.dmg
